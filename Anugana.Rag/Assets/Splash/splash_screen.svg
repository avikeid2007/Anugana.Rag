<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A67F8" />
      <stop offset="50%" stop-color="#B464FF" />
      <stop offset="100%" stop-color="#159BFF" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#159BFF" />
      <stop offset="100%" stop-color="#67E5AD" />
    </linearGradient>

    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F85977" />
      <stop offset="100%" stop-color="#B464FF" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Glowing Outer Hexagon Frame -->
    <polygon points="256,40 430,140 430,340 256,440 82,340 82,140"
             fill="none" stroke="url(#primaryGrad)" stroke-width="12" stroke-linejoin="round" opacity="0.9" filter="url(#glow)" />

    <!-- Inner Vector Database Layers -->
    <path d="M 160 170 L 256 120 L 352 170 L 256 220 Z" fill="url(#primaryGrad)" opacity="0.85" />
    <path d="M 160 230 L 256 180 L 352 230 L 256 280 Z" fill="url(#accentGrad)" opacity="0.8" />
    <path d="M 160 290 L 256 240 L 352 290 L 256 340 Z" fill="url(#pinkGrad)" opacity="0.9" />

    <!-- Neural Data Nodes & Connections -->
    <circle cx="256" cy="120" r="14" fill="#FFFFFF" filter="url(#glow)" />
    <circle cx="160" cy="170" r="10" fill="#159BFF" />
    <circle cx="352" cy="170" r="10" fill="#B464FF" />
    <circle cx="160" cy="290" r="10" fill="#67E5AD" />
    <circle cx="352" cy="290" r="10" fill="#F85977" />
    <circle cx="256" cy="340" r="14" fill="#FFFFFF" filter="url(#glow)" />

    <!-- Document Lines overlay -->
    <line x1="210" y1="210" x2="302" y2="210" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <line x1="210" y1="235" x2="280" y2="235" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <line x1="210" y1="270" x2="302" y2="270" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <line x1="210" y1="295" x2="260" y2="295" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
