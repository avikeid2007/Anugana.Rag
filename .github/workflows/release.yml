name: Build & Release Artifacts

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'Anugana.Rag/Anugana.Rag.csproj'

jobs:
  # ─── 1. Build Windows Standalone Executable (.exe) ─────────────────────────
  build-windows-exe:
    name: Build Windows Standalone EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Workloads
        run: dotnet workload restore ${{ env.PROJECT_PATH }} || true

      - name: Restore Dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} -p:TargetFrameworks=net10.0-desktop

      - name: Publish Windows Single-File EXE
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -f net10.0-desktop
          -c Release
          -r win-x64
          --self-contained true
          -p:TargetFrameworks=net10.0-desktop
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o ./publish/windows-exe

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anugana.Rag-Windows-Standalone.exe
          path: ./publish/windows-exe/Anugana.Rag.exe

  # ─── 2. Build Windows Native MSIX Package (.msix) ──────────────────────────
  build-windows-msix:
    name: Build Windows MSIX Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore Workloads
        run: dotnet workload restore ${{ env.PROJECT_PATH }} || true

      - name: Restore Dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }} -p:TargetFrameworks=net10.0-windows10.0.26100

      - name: Build MSIX Package
        shell: pwsh
        run: |
          $PackageDir = "${{ github.workspace }}\publish\msix\"
          & msbuild ${{ env.PROJECT_PATH }} `
            /p:Configuration=Release `
            /p:TargetFramework=net10.0-windows10.0.26100 `
            /p:AppxPackageSigningEnabled=false `
            /p:GenerateAppInstallerFile=false `
            /p:AppxPackageDir="$PackageDir" `
            /p:UapAppxPackageBuildMode=SideloadOnly

      - name: List MSIX Output Directory
        shell: pwsh
        run: |
          Write-Host "=== MSIX output directory contents ==="
          if (Test-Path "./publish/msix") {
            Get-ChildItem -Recurse "./publish/msix" | Select-Object FullName, Length
          } else {
            Write-Host "publish/msix directory NOT found"
            Write-Host "=== Searching workspace for *.msix / *.msixbundle ==="
            Get-ChildItem -Recurse "${{ github.workspace }}" -Include "*.msix","*.msixbundle","*.appx","*.appxbundle" -ErrorAction SilentlyContinue | Select-Object FullName
          }

      - name: Upload MSIX Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anugana.Rag-Windows-MSIX
          path: |
            ./publish/msix/**/*.msix
            ./publish/msix/**/*.msixbundle
            ./publish/msix/**/*.appx
            ./publish/msix/**/*.appxbundle

  # ─── 3. Build Android APK (.apk) & App Bundle (.aab) ───────────────────────
  build-android:
    name: Build Android APK & AAB Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Workload
        run: |
          dotnet workload install android
          dotnet workload restore ${{ env.PROJECT_PATH }} || true

      - name: Decode Android Release Keystore (if secret provided)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Restore & Publish Android APK
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            dotnet publish ${{ env.PROJECT_PATH }} \
              -f net10.0-android \
              -c Release \
              -p:TargetFrameworks=net10.0-android \
              -p:AndroidPackageFormat=apk \
              -p:AndroidKeyStore=true \
              -p:AndroidSigningKeyStore=${{ github.workspace }}/release.keystore \
              -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" \
              -o ./publish/android-apk
          else
            dotnet publish ${{ env.PROJECT_PATH }} \
              -f net10.0-android \
              -c Release \
              -p:TargetFrameworks=net10.0-android \
              -p:AndroidPackageFormat=apk \
              -o ./publish/android-apk
          fi

      - name: Restore & Publish Android AAB (Play Store Bundle)
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            dotnet publish ${{ env.PROJECT_PATH }} \
              -f net10.0-android \
              -c Release \
              -p:TargetFrameworks=net10.0-android \
              -p:AndroidPackageFormat=aab \
              -p:AndroidKeyStore=true \
              -p:AndroidSigningKeyStore=${{ github.workspace }}/release.keystore \
              -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
              -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}" \
              -o ./publish/android-aab
          else
            dotnet publish ${{ env.PROJECT_PATH }} \
              -f net10.0-android \
              -c Release \
              -p:TargetFrameworks=net10.0-android \
              -p:AndroidPackageFormat=aab \
              -o ./publish/android-aab
          fi

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anugana.Rag-Android.apk
          path: ./publish/android-apk/*.apk

      - name: Upload Android AAB Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anugana.Rag-Android.aab
          path: ./publish/android-aab/*.aab

  # ─── 4. Build WebAssembly Static Distribution & GitHub Pages ───────────────
  build-webassembly:
    name: Build WebAssembly Web App & GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WASM Workload
        run: |
          dotnet workload install wasm-tools
          dotnet workload restore ${{ env.PROJECT_PATH }} || true

      - name: Publish WASM Web Distribution
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -f net10.0-browserwasm
          -c Release
          -p:TargetFrameworks=net10.0-browserwasm
          -o ./publish/wasm

      - name: List WASM Output Directory (Diagnostics)
        shell: bash
        run: |
          echo "=== WASM output directory ==="
          find ./publish/wasm -maxdepth 3 -type f | head -40 || true

      - name: Fix Base Href & Enable GitHub Pages (.nojekyll)
        run: |
          touch ./publish/wasm/wwwroot/.nojekyll
          sed -i 's|<base href="/" />|<base href="./" />|g' ./publish/wasm/wwwroot/index.html || true

      - name: Deploy Live Web App to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wasm/wwwroot
          force_orphan: true

      - name: Zip WASM Output
        shell: bash
        run: cd ./publish/wasm/wwwroot && zip -r ../../../Anugana.Rag-WebAssembly.zip .

      - name: Upload WASM Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Anugana.Rag-WebAssembly.zip
          path: Anugana.Rag-WebAssembly.zip

  # ─── 5. Create GitHub Release & Attach All Binaries ───────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-windows-exe, build-windows-msix, build-android, build-webassembly]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: Prepare Release Package Files
        run: |
          mkdir -p ./final-release
          find ./release-artifacts -type f \( -name "*.exe" -o -name "*.msix*" -o -name "*.appx*" -o -name "*.apk" -o -name "*.aab" -o -name "*.zip" \) -exec cp {} ./final-release/ \;
          ls -la ./final-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./final-release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
